# SchemaLint -- lefthook configuration
# Installed by: schemalint hooks install
# Documentation: https://schemalint.pages.dev/docs/hooks
#
# This configuration integrates SchemaLint with git hooks via lefthook.
# Pre-commit: scans staged files for schema/query issues (blocks on critical/high)
# Pre-push: runs full scan of the working tree before push

pre-commit:
  parallel: true
  commands:
    schemalint-check:
      run: |
        SCHEMALINT_SKILL_DIR="${SCHEMALINT_SKILL_DIR:-$HOME/.openclaw/skills/schemalint}"
        if [[ -f "$SCHEMALINT_SKILL_DIR/scripts/analyzer.sh" ]]; then
          source "$SCHEMALINT_SKILL_DIR/scripts/patterns.sh"
          source "$SCHEMALINT_SKILL_DIR/scripts/analyzer.sh"
          hook_schemalint_check
        else
          echo "[SchemaLint] Skill not found at $SCHEMALINT_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        Schema/query issues detected in staged files!
        Run 'schemalint scan' to see details.
        Or 'git commit --no-verify' to skip (NOT recommended).

pre-push:
  parallel: true
  commands:
    schemalint-full-scan:
      run: |
        SCHEMALINT_SKILL_DIR="${SCHEMALINT_SKILL_DIR:-$HOME/.openclaw/skills/schemalint}"
        if [[ -f "$SCHEMALINT_SKILL_DIR/scripts/dispatcher.sh" ]]; then
          bash "$SCHEMALINT_SKILL_DIR/scripts/dispatcher.sh" --path . --format text
        else
          echo "[SchemaLint] Skill not found at $SCHEMALINT_SKILL_DIR -- skipping scan"
        fi
      fail_text: |
        SchemaLint detected schema/query quality issues in your codebase.
        Run 'schemalint scan --verbose' for detailed findings.
        Fix critical/high issues before pushing.
